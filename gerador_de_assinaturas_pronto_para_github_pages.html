<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Assinaturas - UniFECAF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Lato:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                        lato: ['Lato', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        input[type=range] { accent-color: #11caa0; }
        input::placeholder { font-style: italic; color: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback } = React;

        const BRAND_COLORS = {
            teal:     { hex: '#11caa0', label: 'Teal' },
            mint:     { hex: '#00df89', label: 'Mint' },
            blue:     { hex: '#0077b6', label: 'Azul' },
            magenta:  { hex: '#f72585', label: 'Magenta' },
            purple:   { hex: '#7b2cbf', label: 'Roxo' },
            yellow:   { hex: '#ffbe0b', label: 'Âmbar' },
            orange:   { hex: '#f4511e', label: 'Laranja' },
            red:      { hex: '#e63946', label: 'Vermelho' },
            cyan:     { hex: '#00b4d8', label: 'Ciano' },
            green:    { hex: '#2EAD6A', label: 'Verde UniFECAF' },
            navyText: { hex: '#ffffff', label: 'Branco' },
        };

        const THEMES = {
            dark:   { label: 'Escuro (Premium)',      bg: '#0d1e36', textPrimary: '#ffffff', textSecondary: '#cbd5e1', border: 'rgba(255,255,255,0.08)' },
            light:  { label: 'Claro (Portal)',         bg: '#ffffff', textPrimary: '#1e293b', textSecondary: '#475569', border: 'rgba(0,0,0,0.08)' },
            navy:   { label: 'Azul Marinho',           bg: '#002855', textPrimary: '#ffffff', textSecondary: '#93c5fd', border: 'rgba(255,255,255,0.12)' },
            slate:  { label: 'Grafite',                bg: '#1e293b', textPrimary: '#f1f5f9', textSecondary: '#94a3b8', border: 'rgba(255,255,255,0.08)' },
            green:  { label: 'Verde Institucional',    bg: '#064e3b', textPrimary: '#ffffff', textSecondary: '#6ee7b7', border: 'rgba(255,255,255,0.10)' },
            warmgray:{ label: 'Cinza Quente',          bg: '#f5f0eb', textPrimary: '#1c1917', textSecondary: '#57534e', border: 'rgba(0,0,0,0.07)' },
        };

        // Gmail recomenda 600×220 mas permitimos ajuste
        const SIZE_PRESETS = [
            { label: 'Gmail (recomendado)', w: 600, h: 220 },
            { label: 'Compacto',            w: 520, h: 195 },
            { label: 'Largo',               w: 680, h: 240 },
            { label: 'Personalizado',       w: null,  h: null  },
        ];

        const UniFecafLogo = ({ theme, height = 28 }) => {
            const t = THEMES[theme] || THEMES.dark;
            const isDark = theme !== 'light' && theme !== 'warmgray';
            const textColor  = isDark ? '#ffffff' : '#005c99';
            const bracketColor = isDark ? '#ffffff' : '#005c99';
            const squareColor  = isDark ? '#11caa0' : '#00b25c';
            return (
                <svg width={height * 3.6} height={height} viewBox="0 0 260 70" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ display: 'block' }}>
                    <path d="M 12,52 L 12,20 L 20,12 L 52,12 L 52,21 L 24,21 L 21,24 L 21,52 Z" fill={bracketColor} />
                    <path d="M 60,20 L 60,52 L 52,60 L 20,60 L 20,52 L 48,52 L 51,49 L 51,20 Z" fill={bracketColor} />
                    <rect x="29" y="29" width="14" height="14" rx="2" fill={squareColor} />
                    <text x="76" y="48" fontFamily="'Poppins','Inter','Segoe UI',sans-serif" fontSize="34" fontWeight="600" fill={textColor} letterSpacing="-1px">
                        Uni<tspan fontWeight="900" fill={textColor}>FECAF</tspan>
                    </text>
                </svg>
            );
        };

        function App() {
            const [name,     setName]     = useState('');
            const [role,     setRole]     = useState('');
            const [email,    setEmail]    = useState('');
            const [phone,    setPhone]    = useState('');
            const [linkedin, setLinkedin] = useState('');
            const [website,  setWebsite]  = useState('www.fecaf.com.br');
            const [slogan,   setSlogan]   = useState('Seu sonho, nossa meta!');

            const [accentColor, setAccentColor] = useState('#11caa0');
            const [customAccent, setCustomAccent] = useState('#11caa0');
            const [theme,      setTheme]      = useState('dark');
            const [photoUrl,   setPhotoUrl]   = useState('');
            const [photoZoom,  setPhotoZoom]  = useState(100);
            const [photoX,     setPhotoX]     = useState(0);
            const [photoY,     setPhotoY]     = useState(0);
            const [showIcons,  setShowIcons]  = useState(true);
            const [showSlogan, setShowSlogan] = useState(true);

            const [sizePreset, setSizePreset] = useState(0);
            const [customW,    setCustomW]    = useState(600);
            const [customH,    setCustomH]    = useState(220);

            const [activeTab,   setActiveTab]   = useState('data');
            const [copiedText,  setCopiedText]  = useState(false);
            const [copiedHtml,  setCopiedHtml]  = useState(false);
            const [isExporting, setIsExporting] = useState(false);

            const signatureRef = useRef(null);
            const fileInputRef = useRef(null);

            const sigW = sizePreset === 3 ? customW : (SIZE_PRESETS[sizePreset].w || 600);
            const sigH = sizePreset === 3 ? customH : (SIZE_PRESETS[sizePreset].h || 220);

            const t = THEMES[theme] || THEMES.dark;

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setPhotoUrl(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const downloadPNG = async () => {
                setIsExporting(true);
                try {
                    await new Promise(r => setTimeout(r, 300));
                    const canvas = await window.html2canvas(signatureRef.current, {
                        scale: 4, useCORS: true, backgroundColor: null, logging: false,
                    });
                    const link = document.createElement('a');
                    link.download = `assinatura_unifecaf_${(name||'sem_nome').toLowerCase().replace(/\s+/g,'_')}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) { console.error(e); }
                finally { setIsExporting(false); }
            };

            const copyRichText = async () => {
                try {
                    const t = THEMES[theme] || THEMES.dark;

                    // Foto como base64 (se houver)
                    const photoSrc = photoUrl || '';
                    const photoCell = photoSrc
                        ? `<td style="padding:0;vertical-align:top;width:${Math.round(sigH*0.78)}px;">
                                <img src="${photoSrc}" width="${Math.round(sigH*0.78)}" height="${Math.round(sigH*0.78)}" alt="${name}"
                                    style="display:block;border-radius:12px;object-fit:cover;width:${Math.round(sigH*0.78)}px;height:${Math.round(sigH*0.78)}px;" />
                           </td>
                           <td style="width:16px;"></td>`
                        : '';

                    const iconStyle = `color:${accentColor};font-size:11px;`;
                    const itemStyle = `font-size:11px;color:${t.textPrimary};font-family:Arial,sans-serif;`;

                    const contactRows = [
                        email    ? `<tr><td style="${itemStyle}">📧&nbsp;<a href="mailto:${email}" style="color:${t.textPrimary};text-decoration:none;">${email}</a></td></tr>` : '',
                        phone    ? `<tr><td style="${itemStyle}">📞&nbsp;<span style="color:${t.textPrimary};">${phone}</span></td></tr>` : '',
                        linkedin ? `<tr><td style="${itemStyle}">💼&nbsp;<a href="https://${linkedin}" style="color:${t.textPrimary};text-decoration:none;">${linkedin}</a></td></tr>` : '',
                        website  ? `<tr><td style="${itemStyle}">🌐&nbsp;<a href="https://${website}" style="color:${t.textPrimary};font-weight:bold;text-decoration:underline;">${website}</a></td></tr>` : '',
                    ].filter(Boolean).join('');

                    const html = `
<table cellpadding="0" cellspacing="0" border="0"
    style="background:${t.bg};border-radius:12px;padding:16px;font-family:Arial,sans-serif;width:${sigW}px;max-width:${sigW}px;">
  <tr>
    ${photoCell}
    <td style="vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0" style="width:100%;">
        <tr>
          <td style="padding-bottom:6px;">
            <span style="font-size:16px;font-weight:bold;color:${accentColor};font-family:Arial,sans-serif;">${name || 'Seu Nome'}</span><br>
            <span style="font-size:12px;color:${t.textSecondary};font-family:Arial,sans-serif;">${role || 'Cargo / Departamento'}</span>
          </td>
        </tr>
        <tr>
          <td style="padding-bottom:6px;">
            <span style="font-size:10px;font-weight:bold;color:${accentColor};text-transform:uppercase;letter-spacing:1px;font-family:Arial,sans-serif;">Contato:</span>
            <table cellpadding="2" cellspacing="0" border="0">${contactRows}</table>
          </td>
        </tr>
        <tr>
          <td style="border-top:1px solid ${t.border};padding-top:6px;">
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-right:8px;">
                  <span style="font-family:'Poppins',Arial,sans-serif;font-size:14px;font-weight:bold;color:${theme==='light'||theme==='warmgray'?'#005c99':'#ffffff'};">Uni<strong>FECAF</strong></span>
                </td>
                ${showSlogan ? `<td><span style="font-size:9px;font-style:italic;color:${t.textSecondary};font-family:Arial,sans-serif;">${slogan}</span></td>` : ''}
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>`;

                    // Copia como HTML rico (funciona no Gmail)
                    const blob = new Blob([html], { type: 'text/html' });
                    const plainBlob = new Blob([`${name} | ${role} | ${email} | ${phone}`], { type: 'text/plain' });
                    const item = new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob });
                    await navigator.clipboard.write([item]);
                    setCopiedText(true);
                    setTimeout(() => setCopiedText(false), 2000);
                } catch(e) {
                    // fallback: copia o DOM renderizado
                    try {
                        const el = signatureRef.current;
                        const range = document.createRange();
                        range.selectNode(el);
                        window.getSelection().removeAllRanges();
                        window.getSelection().addRange(range);
                        document.execCommand('copy');
                        window.getSelection().removeAllRanges();
                        setCopiedText(true);
                        setTimeout(() => setCopiedText(false), 2000);
                    } catch(e2) {}
                }
            };

            const copyHtmlCode = () => {
                if (signatureRef.current) {
                    const ta = document.createElement('textarea');
                    ta.value = signatureRef.current.outerHTML;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    setCopiedHtml(true);
                    setTimeout(() => setCopiedHtml(false), 2000);
                }
            };

            const inputCls = "w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition text-sm placeholder-slate-600";

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* HEADER */}
                    <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur px-6 py-4 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-lg bg-teal-500 flex items-center justify-center shadow-lg shadow-teal-500/20 flex-shrink-0">
                                    <svg viewBox="0 0 72 72" width="52" height="52" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12,56 L12,20 L20,12 L56,12 L56,20 L24,20 L20,24 L20,56 Z" fill="white"/>
                                        <path d="M60,16 L60,52 L52,60 L16,60 L16,52 L48,52 L52,48 L52,16 Z" fill="white"/>
                                        <rect x="28" y="28" width="16" height="16" rx="2" fill="white"/>
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                        Gerador de Assinaturas <span className="text-teal-400 font-poppins">UniFECAF</span>
                                    </h1>
                                    <p className="text-xs text-slate-400">Modelo ultra-compacto otimizado para e-mails e dispositivos móveis</p>
                                </div>
                            </div>
                            <span className="px-3 py-1 text-xs bg-emerald-500/10 text-emerald-400 rounded-full font-medium border border-emerald-500/20 flex items-center gap-1.5">
                                <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                                Layout Compacto Otimizado
                            </span>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
                        {/* EDITOR */}
                        <div className="lg:col-span-5 flex flex-col gap-6">
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden shadow-xl flex flex-col h-full">
                                {/* Tabs */}
                                <div className="flex border-b border-slate-800 bg-slate-900/50 p-1">
                                    {[
                                        { id:'data',  icon:'fa-user-pen',      label:'Dados' },
                                        { id:'photo', icon:'fa-image-portrait', label:'Foto' },
                                        { id:'style', icon:'fa-palette',        label:'Design' },
                                        { id:'canva', icon:'fa-book-open',      label:'Guia Gmail', special: true },
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                            className={`flex-1 py-3 px-2 text-xs md:text-sm font-semibold rounded-xl transition duration-150 flex flex-col items-center gap-1 ${
                                                activeTab === tab.id
                                                    ? (tab.special ? 'bg-emerald-500/20 text-emerald-400 shadow-inner' : 'bg-slate-800 text-white shadow-inner')
                                                    : (tab.special ? 'text-slate-400 hover:text-emerald-300' : 'text-slate-400 hover:text-white')
                                            }`}>
                                            <i className={`fa-solid ${tab.icon} mb-1 text-base`}></i>
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-6 flex-grow overflow-y-auto">
                                    {/* ABA DADOS */}
                                    {activeTab === 'data' && (
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Nome Completo</label>
                                                <input type="text" value={name} onChange={e => setName(e.target.value)}
                                                    placeholder="Ex: Ana Paula Ferreira" className={inputCls} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Cargo / Departamento</label>
                                                <input type="text" value={role} onChange={e => setRole(e.target.value)}
                                                    placeholder="Ex: Coordenadora de Cobrança" className={inputCls} />
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">E-mail Corporativo</label>
                                                    <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                                                        placeholder="seu.nome@fecaf.com.br" className={inputCls} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Telefone / WhatsApp</label>
                                                    <input type="text" value={phone} onChange={e => setPhone(e.target.value)}
                                                        placeholder="(11) 9XXXX-XXXX" className={inputCls} />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">LinkedIn</label>
                                                    <input type="text" value={linkedin} onChange={e => setLinkedin(e.target.value)}
                                                        placeholder="linkedin.com/in/seu-perfil" className={inputCls} />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Website Principal</label>
                                                    <input type="text" value={website} onChange={e => setWebsite(e.target.value)} className={inputCls} />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Slogan UniFECAF</label>
                                                <input type="text" value={slogan} onChange={e => setSlogan(e.target.value)} className={inputCls} />
                                            </div>
                                        </div>
                                    )}

                                    {/* ABA FOTO */}
                                    {activeTab === 'photo' && (
                                        <div className="space-y-4">
                                            <input ref={fileInputRef} type="file" accept="image/*" onChange={handlePhotoUpload} className="hidden" />
                                            {!photoUrl ? (
                                                <button onClick={() => fileInputRef.current.click()}
                                                    className="w-full border-2 border-dashed border-slate-700 rounded-2xl py-10 flex flex-col items-center gap-3 text-slate-400 hover:border-teal-500 hover:text-teal-400 transition">
                                                    <i className="fa-solid fa-cloud-arrow-up text-3xl"></i>
                                                    <span className="font-semibold">Clique para enviar sua foto</span>
                                                    <span className="text-xs text-slate-500">JPG, PNG ou WEBP</span>
                                                </button>
                                            ) : (
                                                <div className="space-y-3">
                                                    <div className="relative w-32 h-40 mx-auto rounded-xl overflow-hidden border-2 border-teal-500 shadow-lg">
                                                        <img src={photoUrl} alt="preview" style={{ width:'100%', height:'100%', objectFit:'cover', transform:`scale(${photoZoom/100}) translate(${photoX}px, ${photoY}px)` }} />
                                                    </div>
                                                    <button onClick={() => { setPhotoUrl(''); if(fileInputRef.current) fileInputRef.current.value=''; }}
                                                        className="w-full text-xs text-red-400 hover:text-red-300 py-1 flex items-center justify-center gap-2">
                                                        <i className="fa-solid fa-trash"></i> Remover foto
                                                    </button>
                                                    {[
                                                        { label:`Zoom (${photoZoom}%)`, min:80, max:160, val:photoZoom, set:setPhotoZoom },
                                                        { label:`Eixo X (${photoX}px)`, min:-50, max:50, val:photoX, set:setPhotoX, reset:true },
                                                        { label:`Eixo Y (${photoY}px)`, min:-50, max:50, val:photoY, set:setPhotoY, reset:true },
                                                    ].map((s,i) => (
                                                        <div key={i}>
                                                            <div className="flex justify-between text-xs text-slate-400 mb-1">
                                                                <span>{s.label}</span>
                                                                {s.reset && <button onClick={() => s.set(0)} className="text-teal-400 hover:underline">Reset</button>}
                                                            </div>
                                                            <input type="range" min={s.min} max={s.max} value={s.val}
                                                                onChange={e => s.set(Number(e.target.value))} className="w-full" />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* ABA DESIGN */}
                                    {activeTab === 'style' && (
                                        <div className="space-y-5">
                                            {/* TAMANHO */}
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">
                                                    Tamanho da Assinatura
                                                </label>
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    {SIZE_PRESETS.map((p, i) => (
                                                        <button key={i} onClick={() => setSizePreset(i)}
                                                            className={`py-2 px-3 rounded-xl border text-xs font-semibold transition ${
                                                                sizePreset === i
                                                                    ? 'bg-teal-500/20 text-teal-300 border-teal-500/50 shadow-lg'
                                                                    : 'bg-slate-900/40 text-slate-400 border-slate-800 hover:text-white'
                                                            }`}>
                                                            {p.label}
                                                            {p.w && <span className="block text-[10px] opacity-60">{p.w}×{p.h}px</span>}
                                                        </button>
                                                    ))}
                                                </div>
                                                {sizePreset === 3 && (
                                                    <div className="grid grid-cols-2 gap-2 mt-2">
                                                        {[
                                                            { label:'Largura (px)', val:customW, set:setCustomW, min:400, max:900 },
                                                            { label:'Altura (px)',  val:customH, set:setCustomH, min:160, max:320 },
                                                        ].map((s,i) => (
                                                            <div key={i}>
                                                                <div className="text-xs text-slate-400 mb-1">{s.label}: <strong className="text-white">{s.val}</strong></div>
                                                                <input type="range" min={s.min} max={s.max} step="10" value={s.val}
                                                                    onChange={e => s.set(Number(e.target.value))} className="w-full" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                <p className="text-[10px] text-amber-400/70 mt-1.5 flex items-center gap-1">
                                                    <i className="fa-solid fa-circle-info"></i>
                                                    Gmail recomenda 600×220 px para melhor exibição
                                                </p>
                                            </div>

                                            {/* TEMA DE FUNDO */}
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tema de Fundo</label>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {Object.entries(THEMES).map(([key, val]) => (
                                                        <button key={key} onClick={() => setTheme(key)}
                                                            className={`py-2 px-3 rounded-xl border text-xs font-semibold transition flex items-center gap-2 ${
                                                                theme === key
                                                                    ? 'border-teal-500/60 shadow-lg ring-1 ring-teal-500/40'
                                                                    : 'border-slate-800 hover:border-slate-600'
                                                            }`}
                                                            style={{ background: val.bg, color: val.textPrimary }}>
                                                            <span className="w-3 h-3 rounded-full border border-white/20 flex-shrink-0" style={{ background: val.bg }}></span>
                                                            {val.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* COR DE DESTAQUE */}
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Cor de Destaque</label>
                                                <div className="flex flex-wrap gap-2.5 mb-3">
                                                    {Object.entries(BRAND_COLORS).map(([key, val]) => (
                                                        <button key={key}
                                                            title={val.label}
                                                            onClick={() => { setAccentColor(val.hex); setCustomAccent(val.hex); }}
                                                            className={`w-8 h-8 rounded-full border-2 transition-all ${
                                                                accentColor === val.hex ? 'border-white scale-110 shadow-lg shadow-white/20' : 'border-transparent opacity-75 hover:opacity-100'
                                                            }`}
                                                            style={{ backgroundColor: val.hex }}
                                                        />
                                                    ))}
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <label className="text-xs text-slate-400">Cor personalizada:</label>
                                                    <input type="color" value={customAccent}
                                                        onChange={e => { setCustomAccent(e.target.value); setAccentColor(e.target.value); }}
                                                        className="w-9 h-9 rounded-lg cursor-pointer border border-slate-700 bg-transparent" />
                                                    <span className="text-xs font-mono text-slate-300">{accentColor}</span>
                                                </div>
                                            </div>

                                            {/* TOGGLES */}
                                            <div className="space-y-2 pt-2 border-t border-slate-800">
                                                {[
                                                    { label:'Exibir ícones de contato', val:showIcons,  set:setShowIcons },
                                                    { label:'Exibir slogan da marca',   val:showSlogan, set:setShowSlogan },
                                                ].map((tog, i) => (
                                                    <label key={i} className="flex items-center gap-3 cursor-pointer p-1.5 rounded-lg hover:bg-slate-900/40 transition">
                                                        <input type="checkbox" checked={tog.val} onChange={e => tog.set(e.target.checked)}
                                                            className="rounded accent-teal-500 w-4 h-4" />
                                                        <span className="text-sm text-slate-300 font-medium">{tog.label}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* ABA GUIA GMAIL */}
                                    {activeTab === 'canva' && (
                                        <div className="space-y-4 text-xs md:text-sm text-slate-300 leading-relaxed">
                                            <div className="p-3 bg-teal-500/10 border border-teal-500/20 text-teal-300 rounded-xl font-medium flex items-center gap-2">
                                                <i className="fa-brands fa-google text-base"></i>
                                                Como adicionar sua assinatura no Gmail
                                            </div>
                                            <div className="space-y-3">
                                                {[
                                                    ['Gere a assinatura', 'Preencha seus dados e clique em Copiar p/ E-mail.'],
                                                    ['Abra as configurações do Gmail', 'Clique na engrenagem no canto superior direito → Ver todas as configurações.'],
                                                    ['Acesse a aba Geral', 'Role a página até encontrar a seção Assinatura.'],
                                                    ['Cole a assinatura', 'Clique em Criar nova e cole com Ctrl + V.'],
                                                    ['Defina como padrão', 'Em Padrões de assinatura, selecione para novos e-mails e respostas.'],
                                                    ['Salve as alterações', 'Role até o final e clique em Salvar alterações.'],
                                                ].map(([title, desc], i) => (
                                                    <div key={i} className="flex gap-3 items-start">
                                                        <span className="w-6 h-6 rounded-full bg-teal-500 text-slate-950 font-bold text-xs flex items-center justify-center flex-shrink-0 mt-0.5">{i+1}</span>
                                                        <div><strong className="text-white block mb-0.5">{title}</strong>{desc}</div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="p-3 bg-amber-500/10 border border-amber-500/20 text-amber-300 rounded-xl text-xs flex items-start gap-2">
                                                <i className="fa-solid fa-circle-info mt-0.5 flex-shrink-0"></i>
                                                <span>Links, ícones e cores são preservados ao colar no Gmail. Use o tamanho <strong>600×220 px</strong> para melhor compatibilidade.</span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Botões */}
                                <div className="p-4 border-t border-slate-800 bg-slate-950/90 flex flex-wrap gap-2">
                                    <button onClick={copyRichText}
                                        className="flex-1 min-w-[140px] px-4 py-2.5 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-slate-950 rounded-xl text-sm font-bold shadow-lg shadow-teal-500/10 transition flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-copy"></i>
                                        {copiedText ? 'Copiado! ✓' : 'Copiar p/ E-mail'}
                                    </button>
                                    <button onClick={downloadPNG} disabled={isExporting}
                                        className="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-sm font-semibold border border-slate-700 transition flex items-center justify-center gap-2">
                                        {isExporting
                                            ? <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                                            : <i className="fa-solid fa-download text-teal-400"></i>
                                        }
                                        PNG 2X
                                    </button>
                                    <button onClick={copyHtmlCode}
                                        className="p-2.5 bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-white rounded-xl border border-slate-800 transition"
                                        title={copiedHtml ? 'HTML copiado!' : 'Copiar código HTML'}>
                                        <i className={`fa-solid ${copiedHtml ? 'fa-check text-teal-400' : 'fa-code'}`}></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* PREVISUALIZAÇÃO */}
                        <div className="lg:col-span-7 flex flex-col justify-center">
                            <div className="space-y-4">
                                <div className="flex items-center justify-between px-2">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-teal-500 animate-ping"></span>
                                        Previsualização do Design
                                    </span>
                                    <span className="text-xs text-slate-500 font-mono">{sigW} × {sigH} px</span>
                                </div>

                                <div className="w-full bg-slate-950/30 p-4 md:p-6 rounded-2xl border border-slate-800/80">
                                    <div style={{ overflowX:'auto', WebkitOverflowScrolling:'touch', paddingBottom:'4px' }}>
                                        <div ref={signatureRef} id="signature-canvas" style={{
                                            width: `${sigW}px`,
                                            height: `${sigH}px`,
                                            backgroundColor: t.bg,
                                            color: t.textPrimary,
                                            fontFamily: '"Lato","Inter",sans-serif',
                                            position: 'relative',
                                            overflow: 'hidden',
                                            borderRadius: '16px',
                                            boxShadow: '0 20px 40px rgba(0,0,0,0.4)',
                                            display: 'flex',
                                            alignItems: 'center',
                                        }}>
                                            {(() => {
                                                // Todas as medidas derivadas de sigW e sigH — sem conflito
                                                const mosaicW   = Math.round(sigW * 0.20);   // 20% da largura
                                                const padding    = Math.round(sigH * 0.07);   // margem interna vertical
                                                const photoSize  = sigH - padding * 2;        // foto cabe com folga vertical
                                                const photoLeft  = Math.round(mosaicW * 0.55); // começa dentro do mosaico
                                                const dataLeft   = photoLeft + photoSize + Math.round(sigH * 0.07); // dados começam após foto + gap
                                                const dataRight  = Math.round(sigW * 0.03);
                                                const dataH      = sigH - padding * 2;
                                                const fSizeName  = Math.max(13, Math.round(sigH * 0.083));
                                                const fSizeRole  = Math.max(9,  Math.round(sigH * 0.050));
                                                const fSizeItem  = Math.max(8,  Math.round(sigH * 0.046));
                                                const logoH      = Math.max(20, Math.round(sigH * 0.122));

                                                return (
                                                    <>
                                                        {/* Mosaico lateral */}
                                                        <div style={{ position:'absolute', left:0, top:0, width:`${mosaicW}px`, height:'100%', zIndex:1, pointerEvents:'none' }}>
                                                            <svg viewBox="0 0 160 320" preserveAspectRatio="none" style={{ width:'100%', height:'100%', display:'block' }}>
                                                                <rect width="160" height="320" fill={t.bg} />
                                                                <polygon points="0,0 120,0 40,80"    fill="#7b2cbf" opacity="0.85" />
                                                                <polygon points="120,0 160,0 160,90"  fill="#0077b6" opacity="0.9"  />
                                                                <polygon points="160,0 120,0 160,40"  fill="#11caa0" />
                                                                <polygon points="0,0 0,110 40,80"     fill="#f72585" opacity="0.9"  />
                                                                <polygon points="40,80 120,0 160,90"  fill="#11caa0" opacity="0.75"/>
                                                                <polygon points="0,110 60,160 0,220"  fill="#ffbe0b" opacity="0.8"  />
                                                                <polygon points="0,110 40,80 80,130"  fill="#7b2cbf" />
                                                                <polygon points="40,80 160,90 120,150" fill="#0077b6" opacity="0.9" />
                                                                <polygon points="80,130 120,150 90,210" fill="#11caa0" />
                                                                <polygon points="90,210 120,150 160,200" fill="#f72585" opacity="0.85"/>
                                                                <polygon points="120,150 160,90 160,200" fill="#7b2cbf" />
                                                                <polygon points="0,220 60,160 50,250"   fill="#0077b6" />
                                                                <polygon points="60,160 90,210 50,250"  fill="#11caa0" opacity="0.8"/>
                                                                <polygon points="90,210 160,200 140,260" fill="#7b2cbf" />
                                                                <polygon points="90,210 140,260 80,290"  fill="#ffbe0b" opacity="0.9"/>
                                                                <polygon points="50,250 90,210 80,290"   fill="#f72585" />
                                                                <polygon points="0,220 50,250 0,290"     fill="#7b2cbf" opacity="0.7"/>
                                                                <polygon points="0,290 50,250 40,320"    fill="#11caa0" />
                                                                <polygon points="50,250 80,290 40,320"   fill="#0077b6" />
                                                                <polygon points="80,290 140,260 120,320" fill="#f72585" />
                                                                <polygon points="80,290 120,320 40,320"  fill="#7b2cbf" />
                                                                <polygon points="140,260 160,200 160,280" fill="#11caa0"/>
                                                                <polygon points="140,260 160,280 120,320" fill="#0077b6"/>
                                                                <polygon points="160,280 160,320 120,320" fill="#ffbe0b"/>
                                                            </svg>
                                                        </div>

                                                        {/* Foto — posição e tamanho 100% derivados de sigW/sigH */}
                                                        <div style={{
                                                            position:'absolute',
                                                            left:`${photoLeft}px`,
                                                            top:`${padding}px`,
                                                            width:`${photoSize}px`,
                                                            height:`${photoSize}px`,
                                                            zIndex:10,
                                                            borderRadius:'14px',
                                                            overflow:'hidden',
                                                            border:`4px solid ${t.bg}`,
                                                            boxShadow:'0 8px 24px rgba(0,0,0,0.25)',
                                                            backgroundColor:'#cbd5e1',
                                                            display:'flex', alignItems:'center', justifyContent:'center',
                                                            flexShrink: 0,
                                                        }}>
                                                            {photoUrl ? (
                                                                <img src={photoUrl} alt={name} style={{ width:'100%', height:'100%', objectFit:'cover', transform:`scale(${photoZoom/100}) translate(${photoX}px, ${photoY}px)` }} />
                                                            ) : (
                                                                <div style={{ textAlign:'center', color:'#64748b', display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
                                                                    <i className="fa-solid fa-user" style={{ fontSize: `${Math.round(photoSize*0.28)}px` }}></i>
                                                                    <span style={{ fontSize:'9px', fontWeight:'bold', letterSpacing:'1px' }}>FOTO</span>
                                                                </div>
                                                            )}
                                                        </div>

                                                        {/* Dados — começa após a foto, nunca sobrepõe */}
                                                        <div style={{
                                                            position:'absolute',
                                                            left:`${dataLeft}px`,
                                                            right:`${dataRight}px`,
                                                            top:`${padding}px`,
                                                            height:`${dataH}px`,
                                                            display:'flex', flexDirection:'column',
                                                            justifyContent:'space-between',
                                                            zIndex:2,
                                                            overflow:'hidden',
                                                        }}>
                                                            <div>
                                                                <h2 style={{ margin:0, fontSize:`${fSizeName}px`, fontWeight:'bold', fontFamily:'"Poppins",sans-serif', color:accentColor, lineHeight:'1.2', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                                                                    {name || 'Seu Nome Aqui'}
                                                                </h2>
                                                                <p style={{ margin:'2px 0 0 0', fontSize:`${fSizeRole}px`, color:t.textSecondary, fontWeight:'500', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                                                                    {role || 'Seu Cargo / Departamento'}
                                                                </p>
                                                            </div>

                                                            <div style={{ display:'flex', flexDirection:'column', gap:'2px' }}>
                                                                <span style={{ fontSize:`${fSizeItem}px`, fontWeight:'700', color:accentColor, textTransform:'uppercase', letterSpacing:'1px', marginBottom:'1px' }}>Contato:</span>
                                                                {[
                                                                    { icon:'fa-envelope', val: email || 'seu@email.fecaf.com.br', href:`mailto:${email}` },
                                                                    { icon:'fa-phone',    val: phone || '(11) 9XXXX-XXXX' },
                                                                    { icon:'fa-brands fa-linkedin', val: linkedin || 'linkedin.com/in/seu-perfil', href:`https://${linkedin}` },
                                                                    { icon:'fa-globe',   val: website, href:`https://${website}`, bold:true },
                                                                ].map((item, i) => item.val ? (
                                                                    <div key={i} style={{ display:'flex', alignItems:'center', gap:'5px', fontSize:`${fSizeItem}px`, overflow:'hidden' }}>
                                                                        {showIcons && <span style={{ color:accentColor, fontSize:`${fSizeItem}px`, flexShrink:0 }}><i className={`fa-solid ${item.icon}`}></i></span>}
                                                                        {item.href ? (
                                                                            <a href={item.href} target="_blank" rel="noreferrer" style={{ color:t.textPrimary, textDecoration: item.bold ? 'underline' : 'none', fontWeight: item.bold ? 'bold' : 'normal', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                                                                                {item.val}
                                                                            </a>
                                                                        ) : (
                                                                            <span style={{ color:t.textPrimary, whiteSpace:'nowrap' }}>{item.val}</span>
                                                                        )}
                                                                    </div>
                                                                ) : null)}
                                                            </div>

                                                            <div style={{ display:'flex', alignItems:'center', gap:'10px', borderTop:`1px solid ${t.border}`, paddingTop:'6px' }}>
                                                                <UniFecafLogo theme={theme} height={logoH} />
                                                                {showSlogan && <span style={{ fontSize:'9px', fontStyle:'italic', color:t.textSecondary, fontWeight:'500' }}>{slogan}</span>}
                                                            </div>
                                                        </div>
                                                    </>
                                                );
                                            })()}
                                        </div>
                                    </div>
                                </div>

                                {/* Info tamanho */}
                                <div className="flex items-center gap-2 px-2">
                                    <i className="fa-solid fa-circle-info text-slate-500 text-xs"></i>
                                    <span className="text-xs text-slate-500">
                                        Tamanho atual: <strong className="text-slate-300">{sigW}×{sigH}px</strong>
                                        {sizePreset === 0 && <span className="ml-2 text-emerald-400/80">✓ tamanho ideal para Gmail</span>}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="border-t border-slate-800 bg-slate-950 py-4 px-6 text-center text-xs text-slate-500">
                        Gerador de Identidade Corporativa UniFECAF © 2026. Todos os direitos reservados.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
