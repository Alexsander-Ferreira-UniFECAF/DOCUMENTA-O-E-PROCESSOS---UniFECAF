<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Processos e Procedimentos — UniFECAF</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue:         #0057A8;
    --blue-dark:    #003D7A;
    --blue-darker:  #002855;
    --blue-light:   #E8F1FB;
    --blue-mid:     #CCE0F5;
    --green:        #2EAD6A;
    --green-dark:   #1B7A3E;
    --green-light:  #E4F7EE;
    --gray-dark:    #1E1E1E;
    --gray-mid:     #555555;
    --white:        #FFFFFF;
    --shadow:       0 4px 16px rgba(0,40,85,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Open Sans', sans-serif; background: #EEF3FA; color: var(--gray-dark); font-size: 14px; line-height: 1.6; }

  .page { margin: 60px auto 40px; max-width: 900px; background: var(--white); border-radius: 4px; overflow: hidden; box-shadow: 0 4px 32px rgba(0,40,85,0.18); }

  /* CABEÇALHO (COVER) */
  .cover { background: linear-gradient(135deg, var(--blue-darker) 0%, var(--blue-dark) 55%, var(--blue) 100%); padding: 40px 52px 36px; position: relative; overflow: hidden; }
  .cover::before { content: ''; position: absolute; top: -80px; right: -80px; width: 320px; height: 320px; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .cover::after { content: ''; position: absolute; bottom: -50px; left: 25%; width: 240px; height: 240px; border-radius: 50%; background: rgba(46,173,106,0.08); }
  .cover-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; position: relative; z-index: 1; }
  .cover-logo { height: 42px; width: auto; display: block; }
  .cover-meta { text-align: right; }
  .cover-badge { display: inline-block; background: rgba(46,173,106,0.22); border: 1px solid rgba(46,173,106,0.45); color: #7DFFC0; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 6px; }
  .cover-meta-info { font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.7; margin-top: 4px; }
  .cover-content { position: relative; z-index: 1; }
  .cover-eyebrow { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--green); margin-bottom: 10px; }
  .cover h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 32px; color: #fff; line-height: 1.15; margin-bottom: 8px; letter-spacing: -0.02em; }
  .cover-accent { margin-top: 28px; height: 3px; background: linear-gradient(90deg, var(--green), rgba(46,173,106,0.1)); border-radius: 2px; }

  /* CORPO */
  .body { padding: 40px 52px; }
  .section-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue-dark); padding-bottom: 8px; border-bottom: 3px solid var(--blue); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
  .description { color: var(--gray-mid); font-size: 14px; line-height: 1.75; margin-bottom: 32px; }

  /* LISTA DE DOCUMENTOS (BOTÕES EXECUTIVOS) */
  .document-list { display: flex; flex-direction: column; gap: 14px; list-style: none; }
  .document-item a { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; background: var(--white); border: 1px solid var(--blue-mid); border-radius: 6px; color: var(--blue-darker); text-decoration: none; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13.5px; box-shadow: var(--shadow); transition: all 0.2s ease; }
  .document-item a:hover { border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,87,168,0.14); }
  .btn-icon { background: var(--blue-dark); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; transition: background 0.2s; }
  .document-item a:hover .btn-icon { background: var(--green); }

  /* RODAPÉ */
  .doc-footer { background: var(--blue-darker); padding: 18px 52px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .doc-footer img { height: 30px; width: auto; }
  .doc-footer span { font-size: 11px; color: rgba(255,255,255,0.5); font-family: 'Montserrat', sans-serif; }

  /* RESPONSIVIDADE MOBILE */
  @media (max-width: 620px) {
    .page { margin: 0; border-radius: 0; }
    .cover { padding: 24px 20px 28px; }
    .cover-top { flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .cover-logo { height: 34px; }
    .cover-meta { text-align: left; }
    .cover h1 { font-size: 22px; }
    .body { padding: 24px 20px; }
    .document-item a { padding: 14px 18px; font-size: 12px; }
    .doc-footer { padding: 14px 20px; flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
